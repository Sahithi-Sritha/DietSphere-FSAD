# ============================================
# RAILWAY DEPLOYMENT CONFIGURATION
# ============================================
# This file tells Railway how to build and deploy the Spring Boot backend

[build]
# Build command - compile and package the Spring Boot app
builder = "NIXPACKS"
buildCommand = "mvn clean package -DskipTests"

[deploy]
# Start command - run the compiled JAR file
startCommand = "java -jar target/diet-balance-tracker-1.0.0.jar"

# Restart policy - automatically restart if the app crashes
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check configuration
healthcheckPath = "/api/health"
healthcheckTimeout = 100

# Port configuration
[deploy.env]
PORT = "8080"
